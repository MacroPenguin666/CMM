# =============================================================================
# China Policy Monitor — Source Registry
# =============================================================================
# Verified government websites, news outlets, and legal databases for tracking
# Chinese policy announcements, work reports, and regulatory changes.
#
# Each source includes:
#   - Direct URL for the official website
#   - RSSHub route (where available) for feed-based monitoring
#   - Category and content type tags
#
# RSSHub instance: https://rsshub.app (public) or self-hosted
# RSSHub docs: https://github.com/DIYgod/RSSHub (43k+ stars, actively maintained)
# =============================================================================

rsshub_base: "https://rsshub.app"

# -----------------------------------------------------------------------------
# 1. CENTRAL GOVERNMENT — TOP-LEVEL BODIES
# -----------------------------------------------------------------------------
central_government:

  - name: "State Council (国务院)"
    name_cn: "国务院"
    url: "https://www.gov.cn"
    category: "central_government"
    content_types: ["policies", "regulations", "work_reports", "executive_orders"]
    rsshub_routes:
      - route: "/gov/zhengce/zuixin"
        description: "Latest policies (最新政策)"
      - route: "/gov/zhengce/wenjian"
        description: "Policy documents (政策文件)"
    notes: "Primary portal for all State Council policy releases"

  - name: "National People's Congress (全国人民代表大会)"
    name_cn: "全国人民代表大会"
    url: "http://www.npc.gov.cn"
    category: "central_government"
    content_types: ["legislation", "laws", "work_reports", "standing_committee"]
    rsshub_routes:
      - route: "/gov/npc/c183"
        description: "NPC news and legislation"
    notes: "Legislative body; publishes laws, amendments, and NPC Standing Committee decisions"

  - name: "Chinese People's Political Consultative Conference (中国人民政治协商会议)"
    name_cn: "中国人民政治协商会议"
    url: "http://www.cppcc.gov.cn"
    category: "central_government"
    content_types: ["proposals", "political_consultation", "work_reports"]
    rsshub_routes: []
    notes: "Advisory body; publishes proposals and consultation reports"

  - name: "National Development and Reform Commission (国家发展和改革委员会)"
    name_cn: "国家发改委"
    url: "https://www.ndrc.gov.cn"
    category: "central_government"
    content_types: ["economic_policy", "five_year_plans", "pricing", "industrial_policy"]
    rsshub_routes:
      - route: "/gov/ndrc/xwdt"
        description: "NDRC news updates"
    notes: "Key macro-economic planning body; publishes Five-Year Plans, industrial policies"

