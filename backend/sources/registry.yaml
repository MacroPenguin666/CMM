# -----------------------------------------------------------------------------
# 7. OFFICIAL SOCIAL MEDIA / WECHAT ACCOUNTS
# -----------------------------------------------------------------------------
social_media:
  notes: |
    Major government bodies operate official WeChat Public Accounts (微信公众号).
    These often publish policy documents BEFORE or simultaneously with official websites.
    RSSHub can convert many WeChat accounts to RSS feeds.
    WeChat accounts cannot be directly scraped — use intermediary services.

  wechat_accounts:
    - name: "国务院客户端"
      entity: "State Council"
      wechat_id: "zhongguo-zhengfu"
      notes: "State Council official account"

    - name: "新华社"
      entity: "Xinhua News Agency"
      wechat_id: "xinhuashefabu1"
      notes: "Xinhua breaking news and policy announcements"

    - name: "人民日报"
      entity: "People's Daily"
      wechat_id: "rmrb"
      notes: "People's Daily official account"

    - name: "央视新闻"
      entity: "CCTV News"
      wechat_id: "cctvnewscenter"
      notes: "CCTV news highlights"

    - name: "中国政府网"
      entity: "gov.cn"
      wechat_id: "zhengfu"
      notes: "Central government portal account"

    - name: "最高人民法院"
      entity: "Supreme People's Court"
      wechat_id: "ch_zgrmfy"
      notes: "Judicial announcements"

    - name: "中国证监会发布"
      entity: "CSRC"
      wechat_id: "csaborui"
      notes: "Securities regulation announcements"

    - name: "网信中国"
      entity: "Cyberspace Administration"
      wechat_id: "cacweixin"
      notes: "Internet/AI regulation updates"

  intermediary_services:
    - name: "WeRSS"
      url: "https://werss.app"
      notes: "Converts WeChat public accounts to RSS feeds (paid service)"
    - name: "Feeddd"
      url: "https://feeddd.org"
      notes: "Community-maintained WeChat-to-RSS service"

